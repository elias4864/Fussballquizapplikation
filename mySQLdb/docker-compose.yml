services:
  mysql:
    image: mysql:8.0
    container_name: fussball-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fussball_quiz
      MYSQL_USER: fussball_elias
      MYSQL_PASSWORD: momo9010
      TZ: Europe/Zurich
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # WICHTIG: Prüfe, ob dieser Ordner lokal wirklich existiert:
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data: